version: '3.8'
# ==============================================================
# Docker Compose — ai-client-scrapper
# Entorno de desarrollo local completo.
# Uso: make dev
# ==============================================================

services:

  # ── 1. Scraper (pipeline de scraping + API interna) ────────
  scraper:
    build:
      context: ./apps/scraper
      target: dev
    container_name: ${APP_NAME:-ai-client-scrapper}-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
    volumes:
      - ./apps/scraper:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - db

  # ── 2. Frontend (interfaz web Streamlit) ───────────────────
  frontend:
    build:
      context: ./apps/scraper
      target: production
    container_name: ${APP_NAME:-ai-client-scrapper}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./apps/frontend/src/assets/templates:/app/src/pages/templates
    depends_on:
      - db

  # ── 3. Base de datos (SQLite en dev, PostgreSQL en prod) ───
  db:
    image: postgres:15-alpine
    container_name: ${APP_NAME:-ai-client-scrapper}-db
    restart: unless-stopped
    profiles:
      - postgres   # Solo se levanta si se activa el perfil: docker compose --profile postgres up
    environment:
      POSTGRES_USER: ${DB_USERNAME:-scrapper}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scrapper}
      POSTGRES_DB: ${DB_DATABASE:-scrapper_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./apps/database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-scrapper}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
